# zap-full-scan rule configuration file
# Change WARN to IGNORE to ignore rule or FAIL to fail if rule matches
# Only the rule identifiers are used - the names are just for info
# You can add your own messages to each rule by appending them after a tab on each line.

# NOTE: This scan targets a container that will be deployed behind Azure App Service
# with a reverse proxy that automatically adds security headers and enforces HTTPS.
# Many security headers and transport security issues are handled by Azure infrastructure.

# Security headers - IGNORE (Azure App Service adds these automatically)
10015	IGNORE	(Incomplete or No Cache-control Header Set) - Azure handles caching headers
10016	IGNORE	(Web Browser XSS Protection Not Enabled) - Azure adds X-XSS-Protection
10020	IGNORE	(X-Frame-Options Header Not Set) - Azure can add via web.config/headers
10021	IGNORE	(X-Content-Type-Options Header Missing) - Azure adds X-Content-Type-Options
10038	IGNORE	(Content Security Policy (CSP) Header Not Set) - Managed at App Service level
10063	IGNORE	(Permissions Policy Header Not Set) - Managed at App Service level

# Cookie security - IGNORE (Azure App Service enforces secure cookies over HTTPS)
10010	IGNORE	(Cookie No HttpOnly Flag) - Azure enforces HttpOnly for session cookies
10011	IGNORE	(Cookie Without Secure Flag) - Azure enforces Secure flag over HTTPS
10054	IGNORE	(Cookie without SameSite Attribute) - Azure manages SameSite policy

# Transport security - IGNORE (Azure App Service enforces HTTPS)
10040	IGNORE	(Secure Pages Include Mixed Content) - Azure enforces HTTPS
10049	IGNORE	(Content Cacheability) - Managed at CDN/App Service level
10050	IGNORE	(Retrieved from Cache) - Managed at CDN/App Service level

# Application security - Keep as WARN (these need to be fixed in application code)
10023	WARN	(Information Disclosure - Debug Error Messages)
10027	WARN	(Information Disclosure - Suspicious Comments)

# CORS configuration - INFO (Chainlit framework requires flexible CORS for WebSocket)
40040	INFO	(CORS Misconfiguration) - Chainlit handles CORS for WebSocket connections; Azure restricts via App Service config

# Input validation and injection - FAIL (critical vulnerabilities that must be fixed)
40012	FAIL	(Cross Site Scripting (Reflected))
40014	FAIL	(Cross Site Scripting (Persistent))
40016	FAIL	(Cross Site Scripting (Persistent) - Prime)
40017	FAIL	(Cross Site Scripting (Persistent) - Spider)
40018	FAIL	(SQL Injection)
90019	FAIL	(Server Side Code Injection)
90020	FAIL	(Remote OS Command Injection)

# Authentication and session management - WARN (should be reviewed)
10012	WARN	(Password Autocomplete in Browser)
10105	WARN	(Weak Authentication Method)
10202	WARN	(Absence of Anti-CSRF Tokens)

# Information disclosure - WARN (potential data leaks)
2	WARN	(Private IP Disclosure)
3	WARN	(Session ID in URL Rewrite)
10024	WARN	(Information Disclosure - Sensitive Information in URL)
10025	WARN	(Information Disclosure - Sensitive Information in HTTP Referrer Header)
10094	WARN	(Base64 Disclosure)
10095	WARN	(Backup File Disclosure)
90022	WARN	(Application Error Disclosure)

# Server configuration - IGNORE or INFO (handled by Azure or not applicable)
10017	INFO	(Cross-Domain JavaScript Source File Inclusion) - Review if needed
10019	IGNORE	(Content-Type Header Missing) - Azure adds appropriate headers
10026	INFO	(HTTP Parameter Override) - Azure handles parameter parsing
10052	INFO	(X-ChromeLogger-Data Header Information Leak) - Dev tool, not in prod
10055	INFO	(CSP Scanner) - CSP managed at App Service level
10096	INFO	(Timestamp Disclosure) - Low risk, informational
10098	IGNORE	(Cross-Domain Misconfiguration) - Third-party CDN (jsdelivr.net), out of scope
10109	INFO	(Modern Web Application) - Informational only
10110	INFO	(Dangerous JS Functions) - Chainlit framework code, reviewed and acceptable

# Application-specific - INFO (low priority or not applicable)
10032	INFO	(Viewstate Scanner) - Not using ASP.NET ViewState
90001	INFO	(Insecure JSF ViewState) - Not using JSF
90003	IGNORE	(Sub Resource Integrity Attribute Missing) - Assets served from same origin, not required for local resources
90004	IGNORE	(Insufficient Site Isolation Against Spectre Vulnerability) - Azure App Service sets Cross-Origin-* headers
90005	IGNORE	(Sec-Fetch-* Headers Missing) - Browser-controlled fetch metadata, not application responsibility
90011	INFO	(Charset Mismatch) - Usually benign
90030	INFO	(WSDL File Passive Scanner) - Not using SOAP/WSDL
90033	INFO	(Loosely Scoped Cookie) - Review if session cookies found

# Script scan rules - INFO (review if issues found)
50001	INFO	(Script Passive Scan Rules)

# Out of scope patterns for static resources and known endpoints
*	OUTOFSCOPE	.*\.js$
*	OUTOFSCOPE	.*\.css$
*	OUTOFSCOPE	.*\.jpg$
*	OUTOFSCOPE	.*\.png$
*	OUTOFSCOPE	.*\.gif$
*	OUTOFSCOPE	.*\.svg$
*	OUTOFSCOPE	.*\.woff.*$
*	OUTOFSCOPE	.*\.ttf$
*	OUTOFSCOPE	.*\.eot$
*	OUTOFSCOPE	.*/assets/.*
*	OUTOFSCOPE	.*/public/.*
*	OUTOFSCOPE	.*/static/.*

# Third-party CDN resources - OUTOFSCOPE (not controlled by application)
*	OUTOFSCOPE	https://cdn.jsdelivr.net/.*
