# ZAP Configuration for AI Discovery Agent

# Rules to include
# Enable all rules by default

# Rules to exclude (if any are causing false positives)
# Example: -config rules.rule\(10015\).enabled=false

# Spider configuration
-config spider.maxDuration=10
-config spider.maxDepth=10
-config spider.maxChildren=10

# Active scanner configuration
-config scanner.maxRuleDurationInMins=5
-config scanner.threadPerHost=2

# Ajax spider configuration (for JavaScript-heavy apps)
-config ajaxSpider.maxDuration=10
-config ajaxSpider.browserId=chrome-headless

# Passive scanner configuration
-config pscan.maxAlertsPerRule=10

# Network configuration
-config network.connection.timeoutInSecs=60
-config network.connection.httpStateEnabled=true

# API configuration (if your app has APIs)
-config api.disablekey=true
