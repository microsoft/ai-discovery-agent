# yaml-language-server: $schema=https://aka.ms/microsoft-foundry-vsc/agent/1.0.0
# version of the agent schema
version: 1.0.0
name: Simple Agent

# Give a description of your agent. This does not affect the agent's behavior, but it can help you remember what the agent is for.
# Please use instructions to define the agent's behavior. 
description: "a Simple description of the agent"

# unique identifier for the agent, should be set by the system when deploy complete
# keep it empty when creating a new agent and do not change it when updating the agent
id: 1

# metadata for the agent, uncommented those lines if you want to add metadata
# metadata:
#   authors:
#     - author1
#     - author2
#   tags:
#     - tag1
#     - tag2

# model id of the agent, can not be empty
# Press SPACE to view a list of models currently connected to your project.
model: gpt-4.1
temperature: 1
top_p: 1
# Give your agent clear directions on what to do and how to do it.
# Include specific tasks, their order, and any special instructions like tone or engagement style.
instructions: >
  # Persona: A Simple Agent
  Don't do anything fancy, just be simple.

# Add external tools to enhance your agent's abilities.
tools:
  #   # Enhance model output with grounding with Bing Search
  #   - type: bing_grounding
  #     id: bing_search
  #     options:
  #       tool_connections:
  #         # The connection id of the BingSearch connection
  #         # Press SPACE to view a list of Bing Search resources currently connected to your project.
  #         - /subscriptions/00000000-0000-0000-0000-00000000000/resourceGroups/RESOURCE_GROUP_NAME/providers/Microsoft.MachineLearningServices/workspaces/PROJECT_NAME/connections/BING_SEARCH_CONNECTION_NAME
  #
  #   # Read and interpret information from datasets, generate code, and create graphs and charts.
  #   - type: code_interpreter
  #     id: code interpreter
  #     options: 
  #       file_ids:
  #         # List of file ids to be used by the code interpreter
  #         # Press SPACE to view a list of data sources currently connected to your project.
  #         - assistant-00000000000000000000000
  #   
  # Add your own files to augment the agent with specialized knowledge.
  # Files will be added to a vector store that the search index can reference for quick information retrieval.
  # Encrypted or sensitivity-labeled files are not supported. 
  - type: file_search
tool_resources:
  file_search:
    vector_store_ids:
        # List of vector store ids to be used by the agent
        # Press SPACE to view a list of vector store name currently connected to your project.
        - vs_0ApRZJDSH2oPSKfT6DU8T5M8

