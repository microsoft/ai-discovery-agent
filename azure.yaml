# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: ai-discovery-agent
services:
  web:
    project: ./src
    language: py
    host: containerapp
hooks:
  preprovision:
    windows:
      shell: pwsh
      run: ./scripts/preprovision.ps1
      interactive: true
      continueOnError: false
    posix:
      shell: sh
      run: ./scripts/preprovision.sh
      interactive: true
      continueOnError: false
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/map-env-vars.ps1
      interactive: true
      continueOnError: false
    posix:
      shell: sh
      run: ./scripts/map-env-vars.sh
      interactive: true
      continueOnError: false
  predeploy:
    windows:
      shell: pwsh
      run: ./scripts/predeploy.ps1
      interactive: false
      continueOnError: false
    posix:
      shell: sh
      run: ./scripts/predeploy.sh
      interactive: false
      continueOnError: false
  preinfradelete:
    windows:
      shell: pwsh
      run: ./scripts/preinfradelete.ps1
      interactive: true
      continueOnError: true
    posix:
      shell: sh
      run: ./scripts/preinfradelete.sh
      interactive: true
      continueOnError: true
