hooks:
  preprovision:
    posix:
      shell: sh
      run: ./scripts/preprovision.sh
      interactive: true
      continueOnError: false
  postprovision:
    posix:
      shell: sh
      run: ./scripts/postprovision.sh
      interactive: true
      continueOnError: false
  predeploy:
    posix:
      shell: sh
      run: ./scripts/predeploy.sh
      interactive: true
      continueOnError: false
  preinfradelete:
    posix:
      shell: sh
      run: ./scripts/preinfradelete.sh
      interactive: true
      continueOnError: true
