# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/ai-discovery-agent/refs/heads/dev/src/aida/static/schema/pages.v0.2.schema.json
# Pages configuration for AI Discovery Workshop Agent
# This file defines all available pages in the application
#
# Structure:
# - sections: Top-level sections in the navigation
# - pages: Individual pages within each section
#   - type: Type of page ("agent", etc.)
#   - persona: Path to the persona prompt file (for agent type)
#   - document: Path to the content document file (for agent type)
#   - documents: List of document files (optional)
#   - title: Page title displayed in the navigation
#   - icon: Emoji icon for the page
#   - url_path: URL path segment for the page
#   - header: Header title displayed at the top of the page
#   - subtitle: Subtitle displayed below the header

agents:
  example_expert:
    persona: prompts/example_persona.md
    document: prompts/example_knowledge.md
    temperature: 0.5
    model: gpt-4o
  example_expert2:
    persona: prompts/example_persona.md
    document: prompts/example_knowledge.md
    temperature: 1
    model: o4-mini
  multi_agent:
    condition: |
      You are a routing agent. Your task is to analyze the user conversation history and return the most appropriate expert to handle the next message.

      The conversation history is delimited by dashes:
      ----------------------
      {input}
      ----------------------

      Choose **only one** of the following outputs:
      - example_expert
      - another_expert

      Apply the following rules in order:

      1. If the conversation is in the **first four steps** of the workshop, return: example_expert.
      2. If the conversation involves **design thinking methods** (e.g., brainstorming, reverse brainstorming, customer journey mapping), return: another_expert.

      Only respond with one of the following words:
      example_expert / another_expert
    model: gpt-4.1-nano
    agents:
      - condition: example_expert
        agent: example_expert
      - condition: another_expert
        agent: example_expert2

sections:
  Coach:
    - type: agent
      default: true
      agent: multi_agent
      title: Workshop Facilitator
      icon: 🧑‍🏫
      url_path: MultiAgent
      header: 🧑‍🏫 Workshop Facilitator
      subtitle: |
        I'm a multi-expert Agent that can help you as a facilitator and have access to the:
        - 💡Example Expert
        - 📄Second Example Expert
      admin_only: true # Only visible to admins
    - type: agent
      agent: example_expert2
      title: Example Expert 2
      icon: 💡
      url_path: DocumentGeneratorExpert
      header: 💡 Example Expert 2
      subtitle: I'm your AI Example Expert 2.
      admin_only: true # Only visible to admins
  Customers:
    - type: agent
      agent: example_expert
      title: Example Expert
      icon: 📄
      url_path: ExampleExpert
      header: 📄 Example Expert
      subtitle: I'm your AI Example Expert.
