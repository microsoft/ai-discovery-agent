# zap-full-scan rule configuration file
# Change WARN to IGNORE to ignore rule or FAIL to fail if rule matches
# Only the rule identifiers are used - the names are just for info
# You can add your own messages to each rule by appending them after a tab on each line.

# Common security headers - Keep as WARN for visibility
10015	WARN	(Incomplete or No Cache-control Header Set)
10016	WARN	(Web Browser XSS Protection Not Enabled)
10020	WARN	(X-Frame-Options Header Not Set)
10021	WARN	(X-Content-Type-Options Header Missing)
10023	WARN	(Information Disclosure - Debug Error Messages)
10027	WARN	(Information Disclosure - Suspicious Comments)
10038	WARN	(Content Security Policy (CSP) Header Not Set)
10063	WARN	(Permissions Policy Header Not Set)

# Cookie security
10010	WARN	(Cookie No HttpOnly Flag)
10011	WARN	(Cookie Without Secure Flag)

