# Checkov Configuration for Azure Infrastructure Security

# This file configures Checkov security scanning for Bicep templates
# Documentation: https://www.checkov.io/

# Skip specific checks with justification
# Format: CKV_AZURE_<number>:<reason>

# Azure App Service Checks
skip-check:
  # CKV_AZURE_17: Ensure the web app has 'Client Certificates (Incoming client certificates)' set
  # Reason: Client certificates not required for this workload. OAuth provides authentication.
  - CKV_AZURE_17
  
  # CKV_AZURE_212: Ensure App Service has a minimum number of instances for fail over
  # Reason: Using S1 tier with single instance for cost optimization. Staging slot provides rollback.
  - CKV_AZURE_212
  
  # CKV_AZURE_222: Ensure that VNet integration is enabled for App Service
  # Reason: Already implemented. Checkov may not detect properly - verify manually.
  - CKV_AZURE_222
  
  # CKV_AZURE_225: Ensure the App Service Plan is zone redundant
  # Reason: Zone redundancy requires Premium tier. S1 tier chosen for cost optimization.
  #         For production with higher SLA requirements, consider upgrading.
  - CKV_AZURE_225

# Soft fail mode (for initial implementation)
# Set to false to fail builds on security issues
soft-fail: false

# Output formats
output: 
  - cli
  - junitxml
  # Uncomment for GitHub Security tab integration (requires code scanning enabled)
  # - sarif

# Framework-specific settings
framework:
  - bicep
  - arm  # ARM templates generated from Bicep

# External modules
download-external-modules: true

# Compact output
compact: true

# Quiet mode (only show failed checks)
quiet: true

# Check severity threshold
# Options: critical, high, medium, low
# Only checks at or above this severity will be evaluated
check-threshold: medium

# Specific checks to always run (high-priority security checks)
check:
  # Network Security
  - CKV_AZURE_35  # Network Security Group allows all traffic
  - CKV_AZURE_12  # Network Security Group allows unrestricted ingress
  
  # Storage Security
  - CKV_AZURE_33  # Storage account uses HTTPS only
  - CKV_AZURE_35  # Storage account default network access is denied
  - CKV_AZURE_36  # Storage account public blob access is disabled
  - CKV_AZURE_43  # Storage account encryption enabled
  
  # App Service Security
  - CKV_AZURE_13  # App Service uses HTTPS only
  - CKV_AZURE_16  # App Service uses latest TLS version
  - CKV_AZURE_18  # App Service has managed identity
  - CKV_AZURE_78  # App Service FTP deployments are disabled
  
  # Azure OpenAI / Cognitive Services
  - CKV_AZURE_131 # Cognitive Services local auth is disabled
  - CKV_AZURE_132 # Cognitive Services customer-managed key encryption
  
  # Identity & Access
  - CKV_AZURE_107 # Role assignments use AAD groups or service principals
  
  # Monitoring & Logging
  - CKV_AZURE_37  # Log retention is set properly

# Ignore specific resources (if needed)
# skip-path:
#   - infra/temp/
#   - infra/examples/

# Enable GitHub annotations
github-action: true

# Set baseline (if migrating from existing infrastructure)
# baseline: .checkov.baseline

# Custom policies directory (if using custom checks)
# external-checks-dir: .checkov/policies/

# Secrets scanning
enable-secret-scan-all-files: true

# Policy metadata filtering
# Skip checks that don't apply to Azure
# skip-framework:
#   - aws
#   - gcp

# Performance settings
parallel: true
max-workers: 4
