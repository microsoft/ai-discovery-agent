name: 02 Main CI/CD
on:
  workflow_dispatch:
  push:
    # Run when commits are pushed to mainline branch (main or master)
    # Set this to the mainline branch you are using
    branches:
      - main
      - dev
    paths:
      - "src/**"
      - ".github/workflows/02-ci-cd.yml"
      - "infra/**"
      - "azure.yaml"

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false # need the deployment to finish
# GitHub Actions workflow to deploy to Azure using azd
# To configure required secrets for connecting to Azure, simply run `azd pipeline config`

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read

jobs:
  build:
    uses: ./.github/workflows/01-ci.yml
    secrets: inherit
    permissions:
      checks: write
      # only needed unless run with comment_mode: off
      pull-requests: write
      # only needed for private repository
      contents: read
      # only needed for private repository
      issues: read
      actions: read
      security-events: write
  provision:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || github.ref == 'refs/heads/release' && 'release' || 'dev' }}
    env:
      AZURE_GH_FED_CLIENT_ID: ${{ vars.AZURE_GH_FED_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
    outputs:
      WEB_APP_NAME: ${{ steps.provision.outputs.WEB_APP_NAME }}
      RESOURCE_GROUP_NAME: ${{ steps.provision.outputs.RESOURCE_GROUP_NAME }}
      ACR_NAME: ${{ steps.provision.outputs.ACR_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install azd
        uses: Azure/setup-azd@v2.2.0

      - name: Log in with Azure (Federated Credentials)
        if: ${{ env.AZURE_GH_FED_CLIENT_ID != '' }}
        run: |
          azd auth login `
            --client-id "$Env:AZURE_GH_FED_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Log in with Azure (Client Credentials)
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        run: |
          $info = $Env:AZURE_CREDENTIALS | ConvertFrom-Json -AsHashtable;
          Write-Host "::add-mask::$($info.clientSecret)"

          azd auth login `
            --client-id "$($info.clientId)" `
            --client-secret "$($info.clientSecret)" `
            --tenant-id "$($info.tenantId)"
        shell: pwsh

      - name: Provision Infrastructure
        id: provision
        run: |
          azd provision --no-prompt
          echo "WEB_APP_NAME=$(azd env get-value WEB_APP_NAME)" >> "$GITHUB_OUTPUT"
          echo "RESOURCE_GROUP_NAME=$(azd env get-value RESOURCE_GROUP_NAME)" >> "$GITHUB_OUTPUT"
          echo "ACR_NAME=$(azd env get-value ACR_NAME)" >> "$GITHUB_OUTPUT"
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_PRINCIPAL_TYPE: "ServicePrincipal"

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || github.ref == 'refs/heads/release' && 'release' || 'dev' }}
      url: ${{ steps.webapp-deploy.outputs.webapp-url }}
    env:
      AZURE_GH_FED_CLIENT_ID: ${{ vars.AZURE_GH_FED_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AUTH_CONFIG_YAML: ${{ secrets.AUTH_CONFIG_YAML }}
      ACR_NAME: ${{ needs.provision.outputs.ACR_NAME }}
      RESOURCE_GROUP_NAME: ${{ needs.provision.outputs.RESOURCE_GROUP_NAME }}
      WEB_APP_NAME: ${{ needs.provision.outputs.WEB_APP_NAME }}
      CONTAINER_IMAGE_NAME: "aida"
    needs: [build, provision]
    outputs:
      STAGING_URL: ${{ steps.deploy-info.outputs.STAGING_URL }}
      PROD_URL: ${{ steps.deploy-info.outputs.PROD_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in with Azure (Federated Credentials)
        uses: azure/login@v2
        if: ${{ env.AZURE_GH_FED_CLIENT_ID != '' }}
        with:
          client-id: ${{ env.AZURE_GH_FED_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in with Azure (Client Credentials)
        uses: azure/login@v2
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Prepare container build context
        id: prepare
        run: |
          # Create auth config and upload to staging slot if AUTH_CONFIG_YAML is non-empty
          if [ -n "${AUTH_CONFIG_YAML}" ]; then
            echo "${AUTH_CONFIG_YAML}" > /tmp/auth-config.yaml
            az webapp deploy --resource-group ${{ env.RESOURCE_GROUP_NAME }} --name ${{ env.WEB_APP_NAME }} --slot staging --src-path /tmp/auth-config.yaml --type=static --target-path /secrets/auth-config.yaml || { echo "az webapp deploy failed"; exit 1; }
          else
            echo "AUTH_CONFIG_YAML is empty, skipping auth-config deployment."
          fi

          # Get ACR login server
          ACR_LOGIN_SERVER=$(az acr show --name ${{ env.ACR_NAME }} --resource-group ${{ env.RESOURCE_GROUP_NAME }} --query loginServer --output tsv)

          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
      - name: Build and push container image to ACR
        run: |
          echo "Building container image using ACR Build..."

          # Set unique image tag with commit SHA for better traceability
          IMAGE_TAG="${{ env.CONTAINER_IMAGE_NAME }}:${GITHUB_SHA::8}-$(date +%s)"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

          # Build image using ACR build (works with private ACR endpoints)
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image $IMAGE_TAG \
            --file src/Dockerfile \
            src/

          echo "Container image built and pushed: ${{ steps.prepare.outputs.ACR_LOGIN_SERVER }}/$IMAGE_TAG"

      - name: Update staging slot sidecar container
        id: webapp-deploy
        run: |
          echo "Updating sidecar container in staging slot..."

          FULL_IMAGE_NAME="${{ steps.prepare.outputs.ACR_LOGIN_SERVER }}/$IMAGE_TAG"

          # Update the main sidecar container in staging slot
          az rest --method PUT \
            --url "https://management.azure.com/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP_NAME }}/providers/Microsoft.Web/sites/${{ env.WEB_APP_NAME }}/slots/staging/sitecontainers/main?api-version=2024-11-01" \
            --body '{
              "properties": {
                "image": "'$FULL_IMAGE_NAME'",
                "isMain": true,
                "targetPort": "8000",
                "authType": "SystemIdentity",
                "userManagedIdentityClientId": "SystemIdentity",
                "inheritAppSettingsAndConnectionStrings": true
              }
            }'

          echo "Sidecar container updated successfully!"

          # Restart staging slot to apply changes
          echo "Restarting staging slot..."
          az webapp restart \
            --name ${{ env.WEB_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --slot staging

      - name: Set deployment URLs
        id: deploy-info
        run: |
          STAGING_URL="https://${{ env.WEB_APP_NAME }}-staging.azurewebsites.net"
          PROD_URL="https://${{ env.WEB_APP_NAME }}.azurewebsites.net"

          echo "STAGING_URL=$STAGING_URL" >> $GITHUB_OUTPUT
          echo "PROD_URL=$PROD_URL" >> $GITHUB_OUTPUT
          echo "webapp-url=$STAGING_URL" >> $GITHUB_OUTPUT

      - name: Warmup staging slot
        run: |
          # Wait for deployment to complete
          echo "Waiting for container to start..."
          sleep 60

          # Get staging slot URL
          STAGING_URL="${{ steps.deploy-info.outputs.STAGING_URL }}"

          # Warmup the application with extended timeout for container startup
          echo "Warming up staging slot at $STAGING_URL"
          for i in {1..10}; do
            echo "Warmup attempt $i/10..."
            if curl -f -s -o /dev/null --connect-timeout 30 --max-time 60 "$STAGING_URL/health"; then
              echo "Warmup successful on attempt $i"
              break
            else
              echo "Warmup attempt $i failed, retrying in 30 seconds..."
              sleep 30
            fi
          done

          # Final verification
          echo "Verifying health endpoint..."
          curl -f --connect-timeout 30 --max-time 60 "$STAGING_URL/health"

          echo "Staging slot warmed up successfully!"

