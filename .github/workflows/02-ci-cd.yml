  config-settings:
    runs-on: ubuntu-latest
    needs: [provision, deploy]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || github.ref == 'refs/heads/release' && 'release' || 'dev' }}
    env:
      AZURE_GH_FED_CLIENT_ID: ${{ vars.AZURE_GH_FED_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      PROD_OAUTH_GITHUB_CLIENT_ID: ${{ secrets.PROD_OAUTH_GITHUB_CLIENT_ID }}
      PROD_OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.PROD_OAUTH_GITHUB_CLIENT_SECRET }}
      STAGING_OAUTH_GITHUB_CLIENT_ID: ${{ secrets.STAGING_OAUTH_GITHUB_CLIENT_ID }}
      STAGING_OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.STAGING_OAUTH_GITHUB_CLIENT_SECRET }}
    steps:
      - name: Log in with Azure (Federated Credentials)
        uses: azure/login@v2
        if: ${{ env.AZURE_GH_FED_CLIENT_ID != '' }}
        with:
          client-id: ${{ env.AZURE_GH_FED_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in with Azure (Client Credentials)
        uses: azure/login@v2
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Set environment variables in staging container app
        if: ${{ env.STAGING_OAUTH_GITHUB_CLIENT_ID != '' && env.STAGING_OAUTH_GITHUB_CLIENT_SECRET != '' }}
        run: |
          echo "Setting OAUTH_GITHUB_CLIENT_ID and OAUTH_GITHUB_CLIENT_SECRET in staging container app"
          az containerapp update --name "${{ needs.provision.outputs.WEB_APP_NAME }}-staging" -g "${{ needs.provision.outputs.RESOURCE_GROUP_NAME }}" \
            --set-env-vars "OAUTH_GITHUB_CLIENT_ID=${{ env.STAGING_OAUTH_GITHUB_CLIENT_ID }}" "OAUTH_GITHUB_CLIENT_SECRET=secretref:oauth-github-client-secret-staging"
          az containerapp secret set --name "${{ needs.provision.outputs.WEB_APP_NAME }}-staging" -g "${{ needs.provision.outputs.RESOURCE_GROUP_NAME }}" \
            --secrets "oauth-github-client-secret-staging=${{ env.STAGING_OAUTH_GITHUB_CLIENT_SECRET }}"

      - name: Set environment variables in prod container app
        if: ${{ env.PROD_OAUTH_GITHUB_CLIENT_ID != '' && env.PROD_OAUTH_GITHUB_CLIENT_SECRET != '' }}
        run: |
          echo "Setting OAUTH_GITHUB_CLIENT_ID and OAUTH_GITHUB_CLIENT_SECRET in prod container app"
          az containerapp update --name "${{ needs.provision.outputs.WEB_APP_NAME }}" -g "${{ needs.provision.outputs.RESOURCE_GROUP_NAME }}" \
            --set-env-vars "OAUTH_GITHUB_CLIENT_ID=${{ env.PROD_OAUTH_GITHUB_CLIENT_ID }}" "OAUTH_GITHUB_CLIENT_SECRET=secretref:oauth-github-client-secret-prod"
          az containerapp secret set --name "${{ needs.provision.outputs.WEB_APP_NAME }}" -g "${{ needs.provision.outputs.RESOURCE_GROUP_NAME }}" \
            --secrets "oauth-github-client-secret-prod=${{ env.PROD_OAUTH_GITHUB_CLIENT_SECRET }}"
