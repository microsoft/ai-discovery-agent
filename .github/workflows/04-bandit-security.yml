name: 04 Bandit Security Scan
on:
  workflow_dispatch:
  push:
    branches: ["dev", "main"]
    paths:
      - "src/**"
      - ".github/workflows/04-bandit-security.yml"
  pull_request:
    branches: ["dev", "main"]
  schedule:
    - cron: "41 3 * * 1"
permissions: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Install Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@1e862dfacbd1d6d858c55d9b792c756523627244 # v7.1.4

      - name: bandit security scan (SARIF)
        if: always()
        run: uv run bandit -c .tools/.bandit.yml -r -f sarif -o results.sarif . || true

      - name: Upload SARIF file
        if: (!cancelled())
        uses: github/codeql-action/upload-sarif@e12f0178983d466f2f6028f5cc7a6d786fd97f4b # v4.31.4
        with:
          # Path to SARIF file relative to the root of the repository
          sarif_file: ${{github.workspace}}/results.sarif
          # Optional category for the results
          # Used to differentiate multiple results for one commit
          category: bandit-scan
