name: 40 DAST-OWASPZap
on:
    push:
        branches: ["main"]
        paths-ignore:
            - "**/*.md"
            - "**/*.txt"
            - "docs/**"
    pull_request:
        branches: ["main", "dev"]
        # These types are all required for CRDA to scan pull requests correctly and securely.
        types: [opened, synchronize, reopened, labeled, edited]
        paths-ignore:
            - "**/*.md"
            - "**/*.txt"
            - "docs/**"
    schedule:
        # Run weekly on Monday at 1:45 PM UTC
        - cron: "45 13 * * 1"
    workflow_call:
    workflow_dispatch:

env:
    # Default port configuration
    CONTAINER_PORT: "8000"

permissions:
    contents: read

jobs:
    dast-scan:
        name: DAST Security Scan
        permissions:
            contents: read # for actions/checkout to fetch code
            security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
            actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3.11.1

            - name: Build container
              run: docker build -t ai-discovery-agent:test ./src

            - name: Run container
              run: |
                  echo "Starting container on port ${{ env.CONTAINER_PORT }}..."
                  docker run -d \
                    --name ai-discovery-agent-test \
                    -p ${{ env.CONTAINER_PORT }}:${{ env.CONTAINER_PORT }} \
                    -e PORT=${{ env.CONTAINER_PORT }} \
                    ai-discovery-agent:test

            - name: Wait for container to be healthy
              run: |
                  echo "Waiting for container to start on port ${{ env.CONTAINER_PORT }}..."
                  timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' localhost:${{ env.CONTAINER_PORT }}/health)" != "200" ]]; do echo "Waiting for /health endpoint..."; sleep 5; done' || false
                  echo "Container is healthy!"

            - name: Test container endpoints
              run: |
                  echo "Testing /health endpoint on port ${{ env.CONTAINER_PORT }}..."
                  HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" localhost:${{ env.CONTAINER_PORT }}/health)
                  if [ "$HEALTH_STATUS" != "200" ]; then
                    echo "Health check failed with status: $HEALTH_STATUS"
                    exit 1
                  fi
                  echo "✓ Health endpoint returned 200"

                  echo "Testing root / endpoint..."
                  ROOT_RESPONSE=$(curl -s localhost:${{ env.CONTAINER_PORT }}/)
                  if [[ ! "$ROOT_RESPONSE" == *"<html"* ]] && [[ ! "$ROOT_RESPONSE" == *"<!DOCTYPE"* ]]; then
                    echo "Root endpoint did not return HTML content"
                    echo "Response: $ROOT_RESPONSE"
                    exit 1
                  fi
                  echo "✓ Root endpoint returned HTML content"

            - name: Run ZAP OWASP full scan
              uses: zaproxy/action-full-scan@v0.13.0
              with:
                  docker_name: "ghcr.io/zaproxy/zaproxy:stable"
                  token: ${{ secrets.GITHUB_TOKEN }}
                  target: "http://localhost:${{ env.CONTAINER_PORT }}"
                  cmd_options: "-a -l WARN -c .zap-config.conf"
                  allow_issue_writing: false

            - name: Upload HTML report
              if: always()
              uses: actions/upload-artifact@v5.0.0
              with:
                  name: zap-scan-report
                  path: report_html.html
                  retention-days: 30

            - name: Create SARIF file from ZAP results
              if: always()
              uses: SvanBoxel/zaproxy-to-ghas@v1.0.2

            - name: Upload SARIF file
              if: always()
              uses: github/codeql-action/upload-sarif@v4.31.2
              with:
                  sarif_file: results.sarif
                  category: dast-owaspzap

            - name: Cleanup
              if: always()
              run: |
                  docker stop ai-discovery-agent-test || true
                  docker rm ai-discovery-agent-test || true
                  docker image prune --force
