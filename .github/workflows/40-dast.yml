name: 40 DAST-OWASPZap
# Dynamic Application Security Testing using OWASP ZAP
# This workflow scans the containerized application for security vulnerabilities
# Configuration: .tools/.zap-rules.conf (focuses on app-level issues; Azure handles infrastructure)
# Documentation: docs/security/DAST_GUIDE.md#11-zap-configuration-for-azure-app-service-deployment

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "docs/**"
  pull_request:
    branches: ["main", "dev"]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "docs/**"
  schedule:
    # Run weekly on Monday at 1:45 PM UTC
    - cron: "45 13 * * 1"
  workflow_call:
  workflow_dispatch:

env:
  # Default port configuration
  CONTAINER_PORT: "8000"

permissions: {}

concurrency:
  group: dast-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  dast-scan:
    name: DAST Security Scan
    permissions:
      contents: read # for actions/checkout to fetch code
      # actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
      issues: write # to create issues if vulnerabilities are found
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build container
        run: docker build -t ai-discovery-agent:test .

      - name: Run container
        env:
          PORT: ${{ env.CONTAINER_PORT }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT || 'https://mock-endpoint.openai.azure.com' }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY || 'test-key' }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION || '2025-01-01-preview' }}
        run: |
          # Generate a random auth secret for the test container
          CHAINLIT_AUTH_SECRET=$(openssl rand -base64 32)
          export CHAINLIT_AUTH_SECRET
          echo "Starting container on port $PORT..."
          docker run -d \
            --name ai-discovery-agent-test \
            -p "$PORT:$PORT" \
            -e PORT \
            -e AZURE_OPENAI_ENDPOINT \
            -e AZURE_OPENAI_API_KEY \
            -e AZURE_OPENAI_API_VERSION \
            -e CHAINLIT_AUTH_SECRET \
            ai-discovery-agent:test

      - name: Wait for container to be healthy
        env:
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
        run: |
          echo "Waiting for container to start on port $CONTAINER_PORT..."
          timeout 300 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' localhost:'"$CONTAINER_PORT"'/health)" != "200" ]]; do echo "Waiting for /health endpoint..."; sleep 5; done' || {
              echo "Container failed to start. Showing logs:"
              docker logs ai-discovery-agent-test
              exit 1
            }

      - name: Test container endpoints
        env:
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
        run: |
          echo "Testing /health endpoint on port $CONTAINER_PORT..."
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" localhost:"$CONTAINER_PORT"/health)
          if [ "$HEALTH_STATUS" != "200" ]; then
            echo "Health check failed with status: $HEALTH_STATUS"
            exit 1
          fi
          echo "✓ Health endpoint returned 200"

          echo "Testing root / endpoint..."
          ROOT_RESPONSE=$(curl -s localhost:"$CONTAINER_PORT"/)
          if [[ ! "$ROOT_RESPONSE" == *"<html"* ]] && [[ ! "$ROOT_RESPONSE" == *"<!DOCTYPE"* ]]; then
            echo "Root endpoint did not return HTML content"
            echo "Response: $ROOT_RESPONSE"
            exit 1
          fi
          echo "✓ Root endpoint returned HTML content"

      # - name: ZAP Scan using Automation Framework
      #   uses: zaproxy/action-af@4dd5346bd6603523068d5ecbf3a366f57cdc1890 # v0.2.0
      #   env:
      #     TARGET_URL: "http://localhost:${{ env.CONTAINER_PORT }}"
      #     #ZAP_AUTH_HEADER: Authorization
      #     #ZAP_AUTH_HEADER_VALUE: xxx
      #   with:
      #     plan: '.tools/.zap-env.yaml'
      #     docker_env_vars: |
      #       TARGET_URL

      # - name: 'Fix SARIF URI schemes'
      #   run: |
      #     # ZAP generates SARIF with http:// URIs from scanning the running app
      #     # GitHub requires file:// URIs or relative paths matching the repo
      #     # Replace http://localhost:8000/ with empty string to make paths relative
      #     if [ -f dast.sarif.json ]; then
      #       sed -i 's|http:\\/\\/localhost:${{ env.CONTAINER_PORT }}||g' dast.sarif.json
      #       echo "✓ Fixed URI schemes in SARIF file"
      #     else
      #       echo "⚠ SARIF file not found at dast.sarif.json"
      #       exit 1
      #     fi

      # - name: 'Save Scan Artifact'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: dast.sarif
      #     path: dast.sarif.json
      #     retention-days: 30

      # - name: Upload SARIF file
      #   if: (!cancelled())
      #   uses: github/codeql-action/upload-sarif@e12f0178983d466f2f6028f5cc7a6d786fd97f4b # v4.31.4
      #   with:
      #     # Path to SARIF file relative to the root of the repository
      #     sarif_file: "${{github.workspace}}/dast.sarif.json"
      #     # Optional category for the results
      #     # Used to differentiate multiple results for one commit
      #     category: zap-scan

      - name: Run ZAP OWASP full scan
        uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c # v0.13.0
        with:
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          token: ${{ secrets.GITHUB_TOKEN }}
          target: "http://localhost:${{ env.CONTAINER_PORT }}"
          cmd_options: "-a -j -l WARN -c .tools/.zap-rules.conf"
          allow_issue_writing: false

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: zap-scan-report-html
          path: report_html.html
          retention-days: 30

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: zap-scan-report-json
          path: report_json.json
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          docker stop ai-discovery-agent-test || true
          docker rm ai-discovery-agent-test || true
          docker image prune --force
