name: Azure Bicep Template Analysis
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/03-bicep-security.yml"
  push:
    branches-ignore:
      - main # for main we run ci/cd
      - dev
    paths:
      - "infra/**"
      - ".github/workflows/03-bicep-security.yml"
permissions: {}

jobs:
  checkov-scan:
    runs-on: ubuntu-latest
    name: Checkov Bicep Analysis
    permissions:
      contents: read # Allows actions/checkout to fetch the code
      security-events: write # Allows github/codeql-action/upload-sarif to upload SARIF results
      checks: write
      # only needed unless run with comment_mode: off
      pull-requests: write
      # only needed for private repository
      issues: read
      # needed to upload SARIF results to the security tab (https://github.com/github/codeql-action/issues/2117)
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Checkov Action
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          output_format: sarif, junitxml, cli
          output_file_path: bicep_results.sarif,bicep_results.xml,console
          config_file: infra/.checkov.yaml # Use project-specific configuration

      # need code scanning activated to upload SARIF results to security tab
      - name: Upload SARIF Results to GitHub
        if: (!cancelled())
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bicep_results.sarif
          category: bicep-scan
      - name: Upload Test Results
        if: (!cancelled())
        uses: actions/upload-artifact@v4
        with:
          name: Bicep Test Results
          path: bicep_results.xml

  publish-infra-test-results:
    name: "Publish Infra Tests Results"
    needs: checkov-scan
    runs-on: ubuntu-latest
    permissions:
      checks: write

      # only needed unless run with comment_mode: off
      pull-requests: write

      # only needed for private repository
      contents: read

      # only needed for private repository
      issues: read
    if: (!cancelled())

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Publish Infra Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "artifacts/**/*.xml"
