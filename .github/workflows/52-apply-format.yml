name: 52 Apply Format

on:
  workflow_run:
    workflows: ["Format Request"]
    types:
      - completed

permissions: {}

jobs:
  apply-format:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'issue_comment' &&
      github.event.workflow_run.conclusion == 'success'

    permissions:
      actions: read
      contents: write
      pull-requests: write

    steps:
      # requires actions/read permission
      - name: Download format request artifact
        uses: actions/github-script@v8
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: ${{ github.event.workflow_run.id }},
            });

            const matchArtifact = artifacts.data.artifacts.find(artifact =>
              artifact.name === "format-request"
            );

            if (!matchArtifact) {
              console.log("No format-request artifact found - no formatting needed");
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: matchArtifact.id,
                archive_format: 'zip',
            });

            const fs = require('fs');
            fs.writeFileSync('${{ github.workspace }}/format-request.zip', Buffer.from(download.data));

      - name: Extract and validate format request
        id: extract
        run: |
          if [ ! -f format-request.zip ]; then
            echo "No format request found - exiting"
            echo "should_format=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          mkdir -p format-request
          unzip -d format-request/ format-request.zip

          # Validate that all required files exist and contain expected data
          if [ ! -f format-request/pr_number ] || [ ! -f format-request/pr_head_sha ] || [ ! -f format-request/pr_head_ref ]; then
            echo "Invalid format request artifact - missing required files"
            exit 1
          fi

          # Read and validate PR information
          PR_NUMBER=$(cat format-request/pr_number)
          PR_HEAD_SHA=$(cat format-request/pr_head_sha)
          PR_HEAD_REF=$(cat format-request/pr_head_ref)
          REQUESTER=$(cat format-request/requester)

          # Validate that PR number is numeric
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid PR number: $PR_NUMBER"
            exit 1
          fi

          # Validate SHA format (40 hex characters, uppercase or lowercase)
          if ! [[ "$PR_HEAD_SHA" =~ ^[a-fA-F0-9]{40}$ ]]; then
            echo "Invalid SHA format: $PR_HEAD_SHA"
            exit 1
          fi

          # Validate and sanitize requester (GitHub username format)
          # Only allow alphanumeric characters, hyphens, and underscores (valid GitHub username format)
          if ! [[ "$REQUESTER" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "Invalid requester format: $REQUESTER"
            exit 1
          fi

          # Additional length check for GitHub usernames (max 39 characters)
          if [ ${#REQUESTER} -gt 39 ]; then
            echo "Requester name too long: $REQUESTER"
            exit 1
          fi

          echo "should_format=true" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_head_sha=$PR_HEAD_SHA" >> $GITHUB_OUTPUT
          echo "pr_head_ref=$PR_HEAD_REF" >> $GITHUB_OUTPUT
          echo "requester=$REQUESTER" >> $GITHUB_OUTPUT

      - name: Checkout PR code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PUSH_PAT }}
          repository: ${{ github.repository }}
          # Check out the PR head sha that corresponds to the original pull_request
          ref: ${{ steps.extract.outputs.pr_head_ref }}

      - name: Security validation
        if: steps.extract.outputs.should_format == 'true'
        run: |
          # Validate that we're only formatting, not executing arbitrary code
          # Check for suspicious files that shouldn't be in a Python project
          find . -name "*.exe" -o -name "*.dll" -o -name "*.so" -o -name "*.dylib" | head -10 | while read file; do
            echo "Warning: Found executable file $file"
          done

          # Ensure pyproject.toml hasn't been modified to include malicious build scripts
          if [ -f pyproject.toml ]; then
            if grep -E "(build-backend|build_meta|build\.py)" pyproject.toml; then
              echo "Build scripts detected in pyproject.toml - manual review required"
            fi
          fi

      - name: Install Python
        if: steps.extract.outputs.should_format == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install uv
        if: steps.extract.outputs.should_format == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Validate pre-commit config
        if: steps.extract.outputs.should_format == 'true'
        run: |
          # Ensure pre-commit config hasn't been tampered with
          if [ -f .pre-commit-config.yaml ]; then
            # Check for suspicious patterns in pre-commit config
            if grep -E "(exec|eval|system|subprocess|shell|bash|sh\ |cmd)" .pre-commit-config.yaml; then
              echo "Suspicious patterns found in pre-commit config"
              exit 1
            fi
          fi

      - name: Apply formatting
        if: steps.extract.outputs.should_format == 'true'
        run: |
          # Use explicit tool versions instead of pre-commit to avoid untrusted code execution
          cd src

          # Install only formatting dependencies with pinned versions
          uv sync --only-group dev
          if uv run pre-commit run --all-files; then
              echo "Pre-commit checks passed or made changes."
          else
              # set -e # If the next one still fails, just fail the job
              echo "Pre-commit checks failed. Running a second time to fix issues."
              uv run pre-commit run --all-files
          fi

      - name: Commit and push changes
        if: steps.extract.outputs.should_format == 'true'
        id: commit
        env:
          REQUESTER: ${{ steps.extract.outputs.requester }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changes_made=false" >> $GITHUB_OUTPUT
          else
            # Create a safe commit message using a here-document to avoid format string vulnerabilities
            COMMIT_MSG=$(cat <<EOF
          Auto-format code with pre-commit

          Requested by: @$REQUESTER

          Co-authored-by: $REQUESTER <$REQUESTER@users.noreply.github.com>
          EOF
            )
            git commit -m "$COMMIT_MSG"
            git push
            echo "changes_made=true" >> $GITHUB_OUTPUT
          fi
      - name: Comment on successful formatting
        if: steps.extract.outputs.should_format == 'true' && steps.commit.outputs.changes_made == 'true'
        uses: actions/github-script@v8
        env:
          REQUESTER: ${{ steps.extract.outputs.requester }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ steps.extract.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Formatting Applied Successfully**

              @${process.env.REQUESTER} Your formatting request has been processed. The code has been automatically formatted using pre-commit hooks.

              **Changes applied:**
              - Code formatting with Black
              - Import sorting with isort
              - Linting fixes with Ruff

              The CI checks should now pass! 🎉`
            });
      - name: Comment on no changes needed
        if: steps.extract.outputs.should_format == 'true' && steps.commit.outputs.changes_made == 'false'
        uses: actions/github-script@v8
        env:
          REQUESTER: ${{ steps.extract.outputs.requester }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ steps.extract.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `ℹ️ **No Formatting Changes Needed**

              @${process.env.REQUESTER} The code in this PR is already properly formatted. No changes were necessary.`
            });
