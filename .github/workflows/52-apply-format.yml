name: Apply Format

on:
  workflow_run:
    workflows: ["Format Request"]
    types:
      - completed

permissions: {}

jobs:
  # Job 1: Unprivileged formatting (no write access, no secrets)
  format-code:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'issue_comment' &&
      github.event.workflow_run.conclusion == 'success'

    permissions:
      actions: read
      contents: read  # Only read access - no write permissions

    outputs:
      should_format: ${{ steps.extract.outputs.should_format }}
      pr_number: ${{ steps.extract.outputs.pr_number }}
      pr_head_sha: ${{ steps.extract.outputs.pr_head_sha }}
      pr_head_ref: ${{ steps.extract.outputs.pr_head_ref }}
      requester: ${{ steps.extract.outputs.requester }}
      changes_made: ${{ steps.apply_format.outputs.changes_made }}

    steps:
      # requires actions/read permission
      - name: Download format request artifact
        uses: actions/github-script@v8
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: ${{ github.event.workflow_run.id }},
            });

            const matchArtifact = artifacts.data.artifacts.find(artifact =>
              artifact.name === "format-request"
            );

            if (!matchArtifact) {
              console.log("No format-request artifact found - no formatting needed");
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: matchArtifact.id,
                archive_format: 'zip',
            });

            const fs = require('fs');
            fs.writeFileSync('${{ github.workspace }}/format-request.zip', Buffer.from(download.data));

      - name: Extract and validate format request
        id: extract
        run: |
          if [ ! -f format-request.zip ]; then
            echo "No format request found - exiting"
            echo "should_format=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          mkdir -p format-request
          unzip -d format-request/ format-request.zip

          # Validate that all required files exist and contain expected data
          if [ ! -f format-request/pr_number ] || [ ! -f format-request/pr_head_sha ] || [ ! -f format-request/pr_head_ref ]; then
            echo "Invalid format request artifact - missing required files"
            exit 1
          fi

          # Read and validate PR information
          PR_NUMBER=$(cat format-request/pr_number)
          PR_HEAD_SHA=$(cat format-request/pr_head_sha)
          PR_HEAD_REF=$(cat format-request/pr_head_ref)
          REQUESTER=$(cat format-request/requester)

          # Validate that PR number is numeric
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid PR number: $PR_NUMBER"
            exit 1
          fi

          # Validate SHA format (40 hex characters, uppercase or lowercase)
          if ! [[ "$PR_HEAD_SHA" =~ ^[a-fA-F0-9]{40}$ ]]; then
            echo "Invalid SHA format: $PR_HEAD_SHA"
            exit 1
          fi

          # Validate and sanitize requester (GitHub username format)
          # Only allow alphanumeric characters, hyphens, and underscores (valid GitHub username format)
          if ! [[ "$REQUESTER" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "Invalid requester format: $REQUESTER"
            exit 1
          fi

          # Additional length check for GitHub usernames (max 39 characters)
          if [ ${#REQUESTER} -gt 39 ]; then
            echo "Requester name too long: $REQUESTER"
            exit 1
          fi

          echo "should_format=true" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_head_sha=$PR_HEAD_SHA" >> $GITHUB_OUTPUT
          echo "pr_head_ref=$PR_HEAD_REF" >> $GITHUB_OUTPUT
          echo "requester=$REQUESTER" >> $GITHUB_OUTPUT


      # First checkout: Use default token for untrusted code (UNPRIVILEGED JOB)
      - name: Checkout PR code (unprivileged)
        if: steps.extract.outputs.should_format == 'true'
        uses: actions/checkout@v5
        with:
          # Use default GITHUB_TOKEN (read-only) for untrusted checkout
          repository: ${{ github.repository }}
          ref: ${{ steps.extract.outputs.pr_head_ref }}
          # Don't persist credentials to avoid privilege escalation
          persist-credentials: false

      - name: Security validation
        if: steps.extract.outputs.should_format == 'true'
        run: |
          # Validate that we're only formatting, not executing arbitrary code
          # Check for suspicious files that shouldn't be in a Python project
          find . -name "*.exe" -o -name "*.dll" -o -name "*.so" -o -name "*.dylib" | head -10 | while read file; do
            echo "Warning: Found executable file $file"
          done

          # Ensure pyproject.toml hasn't been modified to include malicious build scripts
          if [ -f src/pyproject.toml ]; then
            if grep -E "(build-backend|build_meta|build\.py)" src/pyproject.toml; then
              echo "Build scripts detected in pyproject.toml - manual review required"
            fi
          fi


      - name: Install Python
        if: steps.extract.outputs.should_format == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install uv
        if: steps.extract.outputs.should_format == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Validate pre-commit config
        if: steps.extract.outputs.should_format == 'true'
        run: |
          # Ensure pre-commit config hasn't been tampered with
          if [ -f .pre-commit-config.yaml ]; then
            # Check for suspicious patterns in pre-commit config
            if grep -E "(exec|eval|system|subprocess|shell|bash|sh\ |cmd)" .pre-commit-config.yaml; then
              echo "Suspicious patterns found in pre-commit config"
              exit 1
            fi

            # Ensure only safe, known formatting tools are used
            echo "Validating pre-commit hooks..."
            ALLOWED_REPOS="https://github.com/(pre-commit/pre-commit-hooks|charliermarsh/ruff-pre-commit|psf/black|PyCQA/isort)"
            if grep -E "^[[:space:]]*-[[:space:]]*repo:" .pre-commit-config.yaml | grep -v -E "$ALLOWED_REPOS"; then
              echo "Only approved formatting tools are allowed:"
              echo "- https://github.com/pre-commit/pre-commit-hooks"
              echo "- https://github.com/charliermarsh/ruff-pre-commit"
              echo "- https://github.com/psf/black"
              echo "- https://github.com/PyCQA/isort"
              echo ""
              echo "Found repos in config:"
              grep -E "^[[:space:]]*-[[:space:]]*repo:" .pre-commit-config.yaml
              exit 1
            fi
          fi

      - name: Apply formatting (sandboxed)
        if: steps.extract.outputs.should_format == 'true'
        id: apply_format
        run: |
          # Run formatting in a sandboxed way - no network access, no secrets
          cd src

          # Install only formatting dependencies with pinned versions
          uv sync --only-group dev
          UV_PATH=$(dirname $(which uv))

          # Set restrictive environment for formatting
          export HOME=/tmp/sandbox
          export PATH="/usr/local/bin:/usr/bin:/bin:$UV_PATH"
          unset AWS_* AZURE_* GH_* GITHUB_TOKEN

          if uv run pre-commit run --all-files; then
              echo "Pre-commit checks passed or made changes."
          else
              echo "Pre-commit checks failed. Running a second time to fix issues."
              uv run pre-commit run --all-files
          fi

          # Check if any changes were made
          cd ..
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changes_made=false" >> $GITHUB_OUTPUT
          else
            echo "changes_made=true" >> $GITHUB_OUTPUT
          fi

      - name: Create formatted code artifact
        if: steps.extract.outputs.should_format == 'true' && steps.apply_format.outputs.changes_made == 'true'
        run: |
          # Create artifact with formatted code
          mkdir -p /tmp/formatted-code

          # Copy all files to artifact directory
          cp -r . /tmp/formatted-code/repo

          # Copy metadata
          echo "${{ steps.extract.outputs.pr_number }}" > /tmp/formatted-code/pr_number
          echo "${{ steps.extract.outputs.pr_head_sha }}" > /tmp/formatted-code/pr_head_sha
          echo "${{ steps.extract.outputs.pr_head_ref }}" > /tmp/formatted-code/pr_head_ref
          echo "${{ steps.extract.outputs.requester }}" > /tmp/formatted-code/requester

      - name: Upload formatted code artifact
        if: steps.extract.outputs.should_format == 'true' && steps.apply_format.outputs.changes_made == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: formatted-code
          path: /tmp/formatted-code
          retention-days: 1

  # Job 2: Privileged push (write access, with secrets)
  push-changes:
    runs-on: ubuntu-latest
    needs: format-code
    if: needs.format-code.outputs.should_format == 'true' && needs.format-code.outputs.changes_made == 'true'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Download formatted code artifact
        uses: actions/download-artifact@v4
        with:
          name: formatted-code
          path: /tmp/formatted-code/

      - name: Extract and validate formatted code
        id: validate
        run: |
          # Validate artifact contents
          if [ ! -f /tmp/formatted-code/pr_number ] || [ ! -f /tmp/formatted-code/pr_head_ref ]; then
            echo "Invalid formatted code artifact"
            exit 1
          fi

          PR_NUMBER=$(cat /tmp/formatted-code/pr_number)
          PR_HEAD_REF=$(cat /tmp/formatted-code/pr_head_ref)
          REQUESTER=$(cat /tmp/formatted-code/requester)

          # Validate PR number is numeric
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid PR number: $PR_NUMBER"
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_head_ref=$PR_HEAD_REF" >> $GITHUB_OUTPUT
          echo "requester=$REQUESTER" >> $GITHUB_OUTPUT

      - name: Checkout base repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PUSH_PAT }}
          ref: ${{ steps.validate.outputs.pr_head_ref }}

      - name: Apply formatted changes
        run: |
          # Replace current code with formatted version
          rm -rf ./*
          cp -r /tmp/formatted-code/repo/* .

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        id: commit
        env:
          REQUESTER: ${{ steps.validate.outputs.requester }}
        run: |
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changes_made=false" >> $GITHUB_OUTPUT
          else
            # Create a safe commit message
            COMMIT_MSG=$(cat <<EOF
          Auto-format code with pre-commit

          Requested by: @$REQUESTER

          Co-authored-by: $REQUESTER <$REQUESTER@users.noreply.github.com>
          EOF
            )
            git commit -m "$COMMIT_MSG"
            git push
            echo "changes_made=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment on successful formatting
        if: steps.commit.outputs.changes_made == 'true'
        uses: actions/github-script@v8
        env:
          REQUESTER: ${{ steps.validate.outputs.requester }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ steps.validate.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Formatting Applied Successfully**

              @${process.env.REQUESTER} Your formatting request has been processed. The code has been automatically formatted using pre-commit hooks.

              **Changes applied:**
              - Code formatting with Black
              - Import sorting with isort
              - Linting fixes with Ruff

              The CI checks should now pass! 🎉`
            });

  # Job 3: Handle no changes case
  no-changes-comment:
    runs-on: ubuntu-latest
    needs: format-code
    if: needs.format-code.outputs.should_format == 'true' && needs.format-code.outputs.changes_made == 'false'

    permissions:
      pull-requests: write

    steps:
      - name: Comment on no changes needed
        uses: actions/github-script@v8
        env:
          REQUESTER: ${{ needs.format-code.outputs.requester }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ needs.format-code.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `ℹ️ **No Formatting Changes Needed**

              @${process.env.REQUESTER} The code in this PR is already properly formatted. No changes were necessary.`
            });
