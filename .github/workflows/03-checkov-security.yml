name: 03 Checkov Infra & Code Scanning
on:
  push:
    branches: ["dev", "main"]
    paths:
      - "infra/**"
      - "src/**"
      - ".github/workflows/03-checkov-security.yml"
  pull_request:
    branches: ["dev", "main"]
  schedule:
    - cron: "12 5 * * 1"
  workflow_dispatch:
permissions: {}

concurrency:
  group: checkov-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  checkov-scan:
    runs-on: ubuntu-latest
    name: Checkov Analysis
    permissions:
      contents: read # to checkout code
      security-events: write # to upload SARIF results to security tab
      checks: write # to publish test results
      # only needed unless run with comment_mode: off
      pull-requests: write # to comment on PRs with test results
      # only needed for private repository
      issues: read # to read issue information
      # needed to upload SARIF results to the security tab (https://github.com/github/codeql-action/issues/2117)
      actions: read # to read workflow run status
    outputs:
      code-scanning-enabled: ${{ steps.check-code-scanning.outputs.enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Checkov Action
        id: checkov
        uses: bridgecrewio/checkov-action@f99709f8ccc3496220c987b7d8729653237c23dc # v12.0.0
        with:
          directory: .
          output_format: sarif,junitxml,cli
          config_file: .tools/.checkov.yml # Use project-specific configuration

      # Check if code scanning is enabled in the repository
      - name: Check if Code Scanning is enabled
        id: check-code-scanning
        if: (!cancelled())
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            try {
              // Check if code scanning is enabled by querying the GitHub API
              await github.rest.codeScanning.listAlertsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 1
              });

              // If we reach here, code scanning is enabled
              core.setOutput('enabled', 'true');
              console.log('✅ Code scanning is enabled in this repository');

            } catch (error) {
              if (error.status === 404) {
                core.setOutput('enabled', 'false');
                console.log('⚠️ Code scanning is not enabled in this repository');
                console.log('💡 To enable code scanning, go to Settings > Security & analysis > Code scanning');
              } else {
                core.setOutput('enabled', 'false');
                console.log(`❌ Unable to determine code scanning status: ${error.message}`);
                console.log(`Status: ${error.status}`);
              }
            }

      # need code scanning activated to upload SARIF results to security tab
      - name: Upload SARIF Results to GitHub
        if: (!cancelled()) && (steps.check-code-scanning.outputs.enabled == 'true')
        id: upload-sarif-results
        uses: github/codeql-action/upload-sarif@e12f0178983d466f2f6028f5cc7a6d786fd97f4b # v4.31.4
        with:
          sarif_file: bicep_results.sarif
          category: bicep-scan
      - name: Upload Test Results
        id: upload-test-results
        if: (!cancelled()) && (steps.check-code-scanning.outputs.enabled != 'true')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v5.0.2
        with:
          name: Bicep Test Results
          path: bicep_results.xml

  publish-infra-test-results:
    name: "Publish Infra Tests Results"
    needs: checkov-scan
    runs-on: ubuntu-latest
    permissions:
      checks: write # to publish test results

      # only needed unless run with comment_mode: off
      pull-requests: write # to comment on PRs with test results

      # Required for actions/checkout to fetch code in any repository type (public or private)
      contents: read # to read repository contents

      # needed when the workflow needs to read issue information, regardless of repository visibility
      issues: read # to read issue information
    if: (!cancelled() && needs.checkov-scan.outputs.code-scanning-enabled != 'true')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v6.1.0
        with:
          path: artifacts

      - name: Publish Infra Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: "artifacts/**/*.xml"
