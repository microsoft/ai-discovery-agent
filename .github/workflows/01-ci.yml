name: 01 CI - Compilation and Testing
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    branches-ignore:
      - main # for main we run ci/cd
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@5a7eac68fb9809dea845d802897dc5c723910fa3 # v7.1.3

      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: --show-diff-on-failure -c .tools/.pre-commit-config.yaml

      - name: Check Copyright Headers
        id: copyright-check
        if: always()
        shell: bash
        run: ./scripts/check-copyright-headers.sh
        continue-on-error: true

      - name: compile
        if: always()
        run: uv run -m compileall src/
        shell: bash

      - name: Run tests
        if: always()
        run: uv run pytest src/tests --junit-xml pytest.xml

      - name: bandit security scan (XML)
        if: always()
        run: uv run bandit -c .tools/.bandit.yml -r -f xml -o bandit_test.xml . || true

      - name: Check NOTICE file is up to date
        if: always() && (github.base_ref == 'main' || github.base_ref == 'dev' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        shell: bash
        run: |
          echo "Checking if NOTICE file is up to date..."

          # Create temporary files for comparison (excluding timestamp)
          TEMP_CURRENT=$(mktemp)
          TEMP_GENERATED=$(mktemp)
          NOTICE_TMP="$(pwd)/NOTICE.tmp"

          # Verify current NOTICE file exists
          if [ ! -f "NOTICE" ]; then
            echo "❌ Error: NOTICE file does not exist" >&2
            exit 1
          fi

          # Generate a fresh NOTICE file for comparison
          ./scripts/generate-notice.sh --output "$NOTICE_TMP" --verbose

          # Extract content up to the last separator line from both files
          # This excludes the timestamp which will always differ
          LAST_LINE_CURRENT=$(awk '/^================================================================================$/ {found=NR} END {print found}' NOTICE)
          LAST_LINE_GENERATED=$(awk '/^================================================================================$/ {found=NR} END {print found}' "$NOTICE_TMP")

          if [ -z "$LAST_LINE_CURRENT" ] || [ -z "$LAST_LINE_GENERATED" ]; then
            echo "❌ Error: Could not find separator line in NOTICE files" >&2
            rm -f "$TEMP_CURRENT" "$TEMP_GENERATED" "$NOTICE_TMP"
            exit 1
          fi

          # Extract comparable content (everything up to last separator)
          sed -n "1,${LAST_LINE_CURRENT}p" NOTICE > "$TEMP_CURRENT"
          sed -n "1,${LAST_LINE_GENERATED}p" "$NOTICE_TMP" > "$TEMP_GENERATED"

          # Compare the files
          if ! diff -u "$TEMP_CURRENT" "$TEMP_GENERATED"; then
            echo ""
            echo "❌ NOTICE file is out of date!"
            echo "The NOTICE file does not match the current dependencies in pyproject.toml"
            echo ""
            echo "To fix this, run:"
            echo "  ./scripts/generate-notice.sh"
            echo ""
            echo "Then commit the updated NOTICE file."

            # Cleanup
            rm -f "$TEMP_CURRENT" "$TEMP_GENERATED" "$NOTICE_TMP"
            if [[ "$GITHUB_BASE_REF" == "main" || "$GITHUB_REF" == "refs/heads/main" ]]; then
              exit 1
            fi
          else
            echo "✅ NOTICE file is up to date!"
          fi

          # Cleanup
          rm -f "$TEMP_CURRENT" "$TEMP_GENERATED" "$NOTICE_TMP"

      - name: Upload Test Results
        if: (!cancelled())
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v5.0.2
        with:
          name: CI Test Results
          path: |
            src/*test.xml
            copyright-header-check.xml
            copyright-header-check.json

      - name: Add PR Review Comments for Failed Files
        if: github.event_name == 'pull_request' && steps.copyright-check.outcome == 'failure'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');

            // Check if the JSON file exists
            if (!fs.existsSync('copyright-header-check.json')) {
              console.log('JSON file not found, skipping');
              return;
            }

            // Read the JSON file generated by the script
            const jsonContent = fs.readFileSync('copyright-header-check.json', 'utf8');
            const checkResults = JSON.parse(jsonContent);

            const failedFiles = checkResults.failed_files;

            if (!failedFiles || failedFiles.length === 0) {
              console.log('No failed files found in test results');
              return;
            }

            console.log(`Found ${failedFiles.length} files with missing headers`);

            // Create review comments for each failed file
            const comments = failedFiles.map(file => ({
              path: file.path,
              line: 1,
              side: 'RIGHT',
              body: `⚠️ **${file.message}**\n\nThis file is missing the required copyright and license headers.`
            }));

            // Post review with comments
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'COMMENT',
                body: `## Copyright Header Check Failed\n\nFound ${failedFiles.length} file(s) missing required copyright headers. Please review the comments on each file.`,
                comments: comments
              });
              console.log(`Successfully posted review with ${comments.length} comments`);
            } catch (error) {
              console.error('Error posting review:', error);
              // If review fails, try posting individual comments
              for (const comment of comments) {
                try {
                  await github.rest.pulls.createReviewComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    commit_id: context.payload.pull_request.head.sha,
                    ...comment
                  });
                } catch (commentError) {
                  console.error(`Failed to comment on ${comment.path}:`, commentError.message);
                }
              }
            }

      - name: Post PR Comment with File List
        if: github.event_name == 'pull_request' && steps.copyright-check.outcome == 'failure'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');

            // Check if the JSON file exists
            if (!fs.existsSync('copyright-header-check.json')) {
              console.log('JSON file not found, skipping');
              return;
            }

            // Read the JSON file generated by the script
            const jsonContent = fs.readFileSync('copyright-header-check.json', 'utf8');
            const checkResults = JSON.parse(jsonContent);

            const failedFiles = (checkResults.failed_files || []).map(f => f.path);

            if (!failedFiles || failedFiles.length === 0) {
              console.log('No failed files found');
              return;
            }

            // Create a formatted list of files
            const fileList = failedFiles.map(file => `- \`${file}\``).join('\n');

            // Post a general comment to the PR
            const commentBody = `## ⚠️ Copyright Header Check Failed

            Found **${failedFiles.length} file(s)** missing required copyright and license headers.

            ### Files that need to be updated:

            ${fileList}

            Please add the appropriate copyright header at the top of each file listed above.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

            console.log(`Posted PR comment listing ${failedFiles.length} files`);

      - name: Fail if headers are missing
        if: steps.copyright-check.outcome == 'failure'
        shell: bash
        run: |
          if [ -f copyright-header-check.json ]; then
            FAILED_COUNT=$(python3 -c "import json; data=json.load(open('copyright-header-check.json')); print(data['summary']['failed'])")
            echo "::error::Copyright header check failed: ${FAILED_COUNT} file(s) missing required headers"
            exit 1
          else
            echo "::error::Copyright header check script failed to complete"
            exit 1
          fi

  publish-ci-test-results:
    name: "Publish CI Tests Results"
    needs: [build-and-test]
    runs-on: ubuntu-latest
    permissions:
      checks: write

      # only needed unless run with comment_mode: off
      pull-requests: write

      # only needed for private repository
      contents: read

      # only needed for private repository
      issues: read
    if: (!cancelled())

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v6.1.0
        with:
          path: artifacts

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@34d7c956a59aed1bfebf31df77b8de55db9bbaaf # v2.18.0
        with:
          files: "artifacts/**/*.xml"
