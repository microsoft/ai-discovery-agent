name: Copyright Header Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check-headers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Copyright Headers
        id: copyright-check
        shell: bash
        run: ./scripts/check-copyright-headers.sh
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: Copyright Header Test Results
          path: copyright-header-check.xml

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "copyright-header-check.xml"
          check_name: "Copyright Header Check Results"
          comment_title: "Copyright Header Check Results"

      - name: Fail if headers are missing
        if: steps.copyright-check.outcome == 'failure'
        run: exit 1
