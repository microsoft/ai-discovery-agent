name: 51 PR Format Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  check-format:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Install Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@1e862dfacbd1d6d858c55d9b792c756523627244 # v7.1.4

      - name: Check if formatting is needed
        id: format_check
        run: |
          # Install dependencies
          uv sync --only-group dev --directory src

          # Run pre-commit to check if formatting is needed
          set +e
          uv run pre-commit run --all-files --show-diff-on-failure -c .tools/.pre-commit-config.yaml
          format_needed=$?
          set -e

          if [ $format_needed -eq 0 ]; then
            echo "formatting_needed=false" >> $GITHUB_OUTPUT
            echo "No formatting changes needed"
          else
            echo "formatting_needed=true" >> $GITHUB_OUTPUT
            echo "Formatting changes are needed"
          fi

      - name: Comment on PR if formatting needed
        if: steps.format_check.outputs.formatting_needed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ github.event.pull_request.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔧 **Formatting Issues Detected**

              This PR has formatting issues that need to be fixed.

              **Manual fix**: Run \`uv run pre-commit run --all-files -c .tools/.pre-commit-config.yaml\` locally and commit the changes

              The CI will update once formatting is applied.`
            });
