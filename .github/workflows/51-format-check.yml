name: 51 PR Format Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  check-format:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v6.0.0
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@eb1897b8dc4b5d5bfe39a428a8f2304605e0983c # v7.0.0

      - name: Check if formatting is needed
        id: format_check
        run: |
          # Install dependencies
          uv sync --only-group dev --directory src

          # Run pre-commit to check if formatting is needed
          set +e
          uv run pre-commit run --all-files --show-diff-on-failure -c .tools/.pre-commit-config.yaml
          format_needed=$?
          set -e

          if [ $format_needed -eq 0 ]; then
            echo "formatting_needed=false" >> $GITHUB_OUTPUT
            echo "No formatting changes needed"
          else
            echo "formatting_needed=true" >> $GITHUB_OUTPUT
            echo "Formatting changes are needed"
          fi

      - name: Comment on PR if formatting needed
        if: steps.format_check.outputs.formatting_needed == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.1
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ github.event.pull_request.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔧 **Formatting Issues Detected**

              This PR has formatting issues that need to be fixed. You can:

              1. **Auto-format**: Comment \`/format\` on this PR to automatically apply formatting fixes
              2. **Manual fix**: Run \`uv run pre-commit run --all-files -c .tools/.pre-commit-config.yaml\` locally and commit the changes

              The CI will update once formatting is applied.`
            });
