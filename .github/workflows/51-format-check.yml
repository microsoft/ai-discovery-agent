name: 51 PR Format Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

concurrency:
  group: format-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-format:
    runs-on: ubuntu-latest

    permissions:
      contents: read # to checkout code
      pull-requests: write # to comment on PRs about formatting issues

    steps:
      - name: Checkout PR code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: false

      - name: Check if formatting is needed
        id: format_check
        run: |
          # Install dependencies
          uv sync --only-group dev --directory src

          # Run pre-commit to check if formatting is needed
          set +e
          uv run pre-commit run --all-files --show-diff-on-failure -c .tools/.pre-commit-config.yaml
          format_needed=$?
          set -e

          if [ $format_needed -eq 0 ]; then
            echo "formatting_needed=false" >> $GITHUB_OUTPUT
            echo "No formatting changes needed"
          else
            echo "formatting_needed=true" >> $GITHUB_OUTPUT
            echo "Formatting changes are needed"
          fi

      - name: Comment on PR if formatting needed
        if: steps.format_check.outputs.formatting_needed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔧 **Formatting Issues Detected**

              This PR has formatting issues that need to be fixed.

              **Manual fix**: Run \`uv run pre-commit run --all-files -c .tools/.pre-commit-config.yaml\` locally and commit the changes

              The CI will update once formatting is applied.`
            });
