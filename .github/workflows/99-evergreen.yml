name: 99 Weekly dependabot checks
on:
  workflow_dispatch:
  schedule:
    - cron: "3 2 1 * *"

permissions: {}

jobs:
  evergreen:
    name: Evergreen Dependency Checks
    runs-on: ubuntu-latest
    permissions:
      issues: write # to create issues for outdated dependencies
      contents: read # to read repository contents
    concurrency:
      group: evergreen-${{ github.workflow }}-${{ github.ref || github.run_id }}
      cancel-in-progress: true

    steps:
      - name: Run evergreen action
        uses: github/evergreen@a1db228c4f7eed5e04d5e9e6f79392f8dfca9b3b # v1.24.6
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
