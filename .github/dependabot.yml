version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/src"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
      semver-major-days: 30
  - package-ecosystem: "github-actions"
    directory: "/"
    rebase-strategy: "disabled"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
